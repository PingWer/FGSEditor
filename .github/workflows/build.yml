name: Build FGSEditor

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PySide6 matplotlib numpy Nuitka
          python -m pip install .

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: ${{ runner.os }}-nuitka-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-

      - name: Build with Nuitka
        shell: cmd
        run: |
          python -m nuitka --standalone --windows-console-mode=disable ^
            --plugin-enable=pyside6 ^
            --windows-icon-from-ico=icon.ico ^
            --windows-company-name="PingWer" ^
            --windows-product-name="FGSEditor" ^
            --windows-file-version="3.0.0.0" ^
            --windows-product-version="3.0.0.0" ^
            --windows-file-description="Film Grain Strength Editor" ^
            --output-dir=dist fgseditor_qt/fgsview_loader.py ^
            --include-package=fgseditor_qt ^
            --output-filename=FGSEditor.exe ^
            --assume-yes-for-downloads ^
            --include-windows-runtime-dlls=no ^
            --include-data-files=icon.ico=icon.ico

      - name: Prepare artifact
        shell: pwsh
        run: |
          mkdir release
          Move-Item -Path dist/fgsview_loader.dist -Destination release/FGSEditor
          Copy-Item -Path FGS_grain_size  -Destination release/FGSEditor/FGS_grain_size  -Recurse
          Copy-Item -Path FGS_size_table  -Destination release/FGSEditor/FGS_size_table  -Recurse
          Copy-Item -Path Templates       -Destination release/FGSEditor/Templates        -Recurse
          Copy-Item -Path grav1synth.exe  -Destination release/FGSEditor/grav1synth.exe
          Copy-Item -Path NOTICE.md       -Destination release/FGSEditor/NOTICE.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FGSEditor-Windows
          path: release/

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-cursor0 libxcb-shape0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xkb1 \
            libxkbcommon-x11-0 libegl1 libgl1-mesa-glx libglib2.0-0 \
            libfontconfig1 libdbus-1-3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          PYTHONPATH=. pyinstaller --noconfirm --onefile --noconsole \
            --name "FGSEditor" \
            --add-data "icon.ico:." \
            --paths "." \
            fgseditor_qt/fgsview_loader.py

      - name: Prepare artifact
        run: |
          mkdir -p release/FGSEditor
          cp dist/FGSEditor release/FGSEditor/
          cp -r FGS_grain_size  release/FGSEditor/FGS_grain_size
          cp -r FGS_size_table  release/FGSEditor/FGS_size_table
          cp -r Templates       release/FGSEditor/Templates
          cp    NOTICE.md       release/FGSEditor/NOTICE.md
          chmod +x release/FGSEditor/FGSEditor

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FGSEditor-Linux
          path: release/
